server {
    listen 3000;
    client_max_body_size 50m;

    location /api/ {
        proxy_pass http://mcp-server:3000;
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
    }

    location /openapi/ {
        proxy_pass http://mcp-server:3000;
        proxy_http_version 1.1;
        proxy_buffering off;
    }

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}
